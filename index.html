<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portafolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <ul>
            <li>Inicio</li>
            <li>Proyectos</li>
            <li>Contacto</li>
        </ul>
    </nav>
    <h1>Bienvenido a  mi Portafolio</h1>
    <section>
        <h2>Sobre mi</h2>
        <p>Soy un desarrollador web con experiencia en HTML, CSS y JavaScript. Me apasiona crear sitios web atractivos y funcionales.</p>
    </section>
    <section>
        <h2>Contacto</h2>
        <form id="formulario-contacto">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" required placeholder="Tu nombre aquí">
            <label for="email">Email:</label>
            <input type="email" id="email" required placeholder="Tu email aquí">
            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" required placeholder="Tu mensaje aquí"></textarea>
            <button type="submit">Enviar</button>
        </form>
    </section>
    <p>Este es un proyecto de Portafolio</p>
    
</body>
</html>
